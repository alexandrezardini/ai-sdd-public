version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: video-max-postgres
    environment:
      POSTGRES_DB: video_max_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: video-max-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring-boot-app:
    build:
      context: ./video-max-backend
      dockerfile: Dockerfile
    container_name: video-max-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APP_JWT_SECRET: dev-local-secret-key-minimum-32-characters-required
      APP_JWT_ISSUER: video-max
      APP_MAIL_RESET_LINK_BASE: http://localhost:3000/reset-password
      APP_RATE_LIMIT_TRUST_PROXY: "false"
    volumes:
      - ./video-max-backend/src:/app/src        # hot-reload source
      - maven_cache:/root/.m2                   # persist downloaded deps
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./video-max-frontend
      dockerfile: Dockerfile
    container_name: video-max-frontend
    ports:
      - "3000:3000"
    depends_on:
      - spring-boot-app
    environment:
      # NEXT_PUBLIC_* vars are inlined at build/compile time and run in the browser,
      # so they must point to localhost (accessible from the user's machine, not Docker network).
      NEXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./video-max-frontend/src:/app/src           # hot-reload source
      - ./video-max-frontend/public:/app/public      # static assets
      - frontend_node_modules:/app/node_modules      # keep container's node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  maven_cache:
  frontend_node_modules:
