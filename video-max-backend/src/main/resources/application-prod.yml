spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: ${APP_JWT_SECRET}
  mail:
    resetLinkBase: ${APP_MAIL_RESET_LINK_BASE}
  rateLimitTrustProxy: ${APP_RATE_LIMIT_TRUST_PROXY:false}

logging:
  level:
    root: WARN
    com.videomax: INFO
