databaseChangeLog:
  - changeSet:
      id: 003-create-password-reset-tokens
      author: IA
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: consumed_at
                  type: TIMESTAMPTZ
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_password_reset_tokens_user
            baseTableName: password_reset_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: ux_password_reset_tokens_hash
            tableName: password_reset_tokens
            unique: true
            columns:
              - column:
                  name: token_hash
        - createIndex:
            indexName: ix_password_reset_tokens_user_id
            tableName: password_reset_tokens
            columns:
              - column:
                  name: user_id
      rollback:
        - dropTable:
            tableName: password_reset_tokens
